<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正晔云 - 劳务管理系统</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  input, select, textarea, button { font-family: inherit; }
  table { border-collapse: collapse; }
  .nav-item:hover { background: rgba(255,255,255,0.08) !important; }
  .child-item:hover { background: rgba(255,255,255,0.06) !important; }
  .action-link:hover { text-decoration: underline; }
  .card-hover:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  tr:hover td { background: #fafafa; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const ACCENT = "#c0392b";
const SIDEBAR = "#2c2c2c";

// ── Primitives ─────────────────────────────────────────────────────────────
const s = {
  card: { background:"#fff", borderRadius:6, border:"1px solid #eee" },
  th: { padding:"10px 12px", textAlign:"left", color:"#888", fontWeight:500, fontSize:13, borderBottom:"1px solid #eee", whiteSpace:"nowrap", background:"#fafafa" },
  td: { padding:"10px 12px", fontSize:13, color:"#333", borderBottom:"1px solid #f5f5f5", verticalAlign:"middle" },
  input: { padding:"5px 10px", border:"1px solid #ddd", borderRadius:4, fontSize:13, outline:"none", width:"100%" },
  select: { padding:"5px 10px", border:"1px solid #ddd", borderRadius:4, fontSize:13, outline:"none", background:"#fff" },
  btn: { background:ACCENT, color:"#fff", border:"none", borderRadius:4, padding:"6px 18px", cursor:"pointer", fontSize:13, whiteSpace:"nowrap" },
  outBtn: { background:"#fff", color:ACCENT, border:`1px solid ${ACCENT}`, borderRadius:4, padding:"5px 16px", cursor:"pointer", fontSize:13, whiteSpace:"nowrap" },
  grayBtn: { background:"#fff", color:"#666", border:"1px solid #ddd", borderRadius:4, padding:"5px 16px", cursor:"pointer", fontSize:13 },
};

function Tag({ v }) {
  const map = {
    "已发布":["#e8f4ff","#1890ff"], "草稿":["#f5f5f5","#999"],
    "已签约":["#f0fff4","#52c41a"], "未交付":["#fff7e6","#fa8c16"],
    "已交付":["#f0fff4","#1890ff"], "审核通过":["#f0fff4","#52c41a"],
    "待提交":["#fff7e6","#fa8c16"], "已发放":["#f0fff4","#52c41a"],
    "充值成功":["#f0fff4","#52c41a"], "挂起":["#f5f5f5","#999"],
  };
  const [bg,color] = map[v]||["#f5f5f5","#666"];
  return <span style={{background:bg,color,padding:"2px 10px",borderRadius:3,fontSize:12,whiteSpace:"nowrap"}}>{v}</span>;
}
function A({ label, onClick }) {
  return <span className="action-link" onClick={onClick} style={{color:ACCENT,cursor:"pointer",fontSize:12,marginRight:8}}>{label}</span>;
}
function Btn({ children, onClick, style }) {
  return <button onClick={onClick} style={{...s.btn,...style}}>{children}</button>;
}
function OBtn({ children, onClick }) {
  return <button onClick={onClick} style={s.outBtn}>{children}</button>;
}
function GBtn({ children, onClick }) {
  return <button onClick={onClick} style={s.grayBtn}>{children}</button>;
}
function FInput({ label, placeholder, width=160 }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
      {label&&<span style={{color:"#666",fontSize:13}}>{label}</span>}
      <input placeholder={placeholder} style={{...s.input,width}} />
    </div>
  );
}
function FSelect({ label, opts=[], width=130 }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      {label&&<span style={{color:"#666",fontSize:13}}>{label}</span>}
      <select style={{...s.select,width}}>
        {opts.map(o=><option key={o}>{o}</option>)}
      </select>
    </div>
  );
}
function FDate({ label }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
      {label&&<span style={{color:"#666",fontSize:13}}>{label}</span>}
      <span style={{color:"#bbb",fontSize:12,border:"1px solid #ddd",padding:"5px 6px",borderRadius:4}}>📅</span>
      <input type="date" style={{...s.input,width:130}} />
      <span style={{color:"#999"}}>至</span>
      <input type="date" style={{...s.input,width:130}} />
    </div>
  );
}
function SearchBox({ children }) {
  return (
    <div style={{...s.card,margin:"14px 20px 0",padding:"14px 18px"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:"10px 18px",alignItems:"center"}}>
        {children}
        <Btn>查询</Btn>
      </div>
    </div>
  );
}
function TH({ cols }) {
  return <thead><tr>{cols.map((c,i)=><th key={i} style={s.th}>{c}</th>)}</tr></thead>;
}
function Pager({ total }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",fontSize:13,color:"#666",borderTop:"1px solid #f0f0f0"}}>
      <span>共{total}条</span>
      <select style={{...s.select,width:80,fontSize:12}}><option>10条/页</option><option>20条/页</option></select>
      <span style={{cursor:"pointer",padding:"2px 6px",border:"1px solid #ddd",borderRadius:3}}>‹</span>
      <span style={{background:ACCENT,color:"#fff",borderRadius:3,padding:"2px 8px",fontSize:12}}>1</span>
      <span style={{cursor:"pointer",padding:"2px 6px"}}>2</span>
      <span style={{cursor:"pointer",padding:"2px 6px"}}>3</span>
      <span>…</span>
      <span style={{cursor:"pointer",padding:"2px 6px",border:"1px solid #ddd",borderRadius:3}}>›</span>
      <span style={{marginLeft:8}}>前往</span>
      <input defaultValue="1" style={{width:36,padding:"2px 4px",border:"1px solid #ddd",borderRadius:3,textAlign:"center",fontSize:12,outline:"none"}} />
      <span>页</span>
    </div>
  );
}
function PageHd({ title, crumb, onBack, right }) {
  return (
    <div style={{padding:"16px 20px 0",display:"flex",alignItems:"center",gap:8}}>
      {onBack&&<span onClick={onBack} style={{color:ACCENT,cursor:"pointer",fontSize:13}}>← 返回</span>}
      {onBack&&<span style={{color:"#ccc",margin:"0 4px"}}>|</span>}
      <span style={{fontSize:15,fontWeight:600,color:"#222"}}>{title}</span>
      {crumb&&<span style={{color:"#999",fontSize:13}}>/ {crumb}</span>}
      <div style={{flex:1}} />
      {right}
    </div>
  );
}
function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"#fff",borderRadius:8,width:440,padding:"24px 32px",position:"relative"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:24}}>{title}</div>
        <span onClick={onClose} style={{position:"absolute",top:14,right:18,cursor:"pointer",color:"#aaa",fontSize:22,lineHeight:1}}>×</span>
        {children}
      </div>
    </div>
  );
}
function TabBar({ tabs, active, onChange }) {
  return (
    <div style={{display:"flex",borderBottom:"1px solid #f0f0f0"}}>
      {tabs.map(t=>(
        <div key={t} onClick={()=>onChange(t)} style={{padding:"11px 20px",cursor:"pointer",fontSize:13,color:active===t?ACCENT:"#666",borderBottom:active===t?`2px solid ${ACCENT}`:"2px solid transparent",userSelect:"none"}}>{t}</div>
      ))}
    </div>
  );
}
function EmptyRow({ cols }) {
  return <tr><td colSpan={cols} style={{textAlign:"center",padding:"52px 0",color:"#ccc",fontSize:14}}>暂无数据</td></tr>;
}

// ── Layout ─────────────────────────────────────────────────────────────────
function Layout({ page, setPage, children }) {
  const groups = {
    "task-sign": ["sign-talent","task-review","delivery-review"],
    finance: ["invoice","recharge","refund","declare"],
    account: ["msg-center","account-info","api-config"],
  };
  const init = {};
  Object.entries(groups).forEach(([k,v])=>{ init[k]=v.includes(page); });
  const [open, setOpen] = useState(init);

  const toggle = k => setOpen(o=>({...o,[k]:!o[k]}));
  const isActive = k => page===k;
  const inGroup = k => groups[k]?.includes(page);

  const menu = [
    {k:"home",      label:"首页",     icon:"🏠"},
    {k:"task-publish",label:"任务发布",icon:"📤"},
    {k:"task-sign", label:"任务签约",  icon:"📋", children:[
      {k:"sign-talent",label:"签约人才"},
      {k:"task-review",label:"任务审核"},
      {k:"delivery-review",label:"交付物审核"},
    ]},
    {k:"task-settle",label:"任务结算", icon:"💰"},
    {k:"task-delivery",label:"任务交付",icon:"📦"},
    {k:"finance",   label:"财务管理",  icon:"📊", children:[
      {k:"invoice",  label:"在线开票"},
      {k:"recharge", label:"账户充值"},
      {k:"refund",   label:"退款明细"},
      {k:"declare",  label:"申报记录"},
    ]},
    {k:"account",   label:"账户管理",  icon:"👤", children:[
      {k:"msg-center",  label:"消息中心"},
      {k:"account-info",label:"账户信息"},
      {k:"api-config",  label:"API配置"},
    ]},
  ];

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:182,background:SIDEBAR,display:"flex",flexDirection:"column",flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid #3d3d3d",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{width:30,height:30,background:ACCENT,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>正</div>
          <span style={{color:"#fff",fontSize:15,fontWeight:700,letterSpacing:1}}>正晔云</span>
        </div>
        <nav style={{flex:1,paddingTop:6}}>
          {menu.map(item=>(
            <div key={item.k}>
              <div className="nav-item" onClick={()=>{ if(item.children){toggle(item.k); if(!open[item.k])setPage(item.children[0].k);} else setPage(item.k); }}
                style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:9,cursor:"pointer",
                  background:isActive(item.k)||inGroup(item.k)?ACCENT:"transparent",
                  color:isActive(item.k)||inGroup(item.k)?"#fff":"#bbb",
                  borderLeft:isActive(item.k)||inGroup(item.k)?"3px solid #e74c3c":"3px solid transparent",
                  transition:"all 0.15s",userSelect:"none"}}>
                <span style={{fontSize:14}}>{item.icon}</span>
                <span style={{flex:1,fontSize:13}}>{item.label}</span>
                {item.children&&<span style={{fontSize:10,opacity:0.7}}>{open[item.k]?"▲":"▼"}</span>}
              </div>
              {item.children&&open[item.k]&&item.children.map(c=>(
                <div key={c.k} className="child-item" onClick={()=>setPage(c.k)}
                  style={{padding:"8px 16px 8px 44px",cursor:"pointer",fontSize:13,
                    background:isActive(c.k)?"#3d1212":"transparent",
                    color:isActive(c.k)?"#fff":"#999",
                    borderLeft:isActive(c.k)?"3px solid #e74c3c":"3px solid transparent",
                    transition:"all 0.15s",userSelect:"none"}}>
                  {c.label}
                </div>
              ))}
            </div>
          ))}
        </nav>
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div style={{height:48,background:"#fff",borderBottom:"1px solid #eee",display:"flex",alignItems:"center",padding:"0 20px",gap:10,flexShrink:0}}>
          <span style={{color:"#999",fontSize:18,cursor:"pointer"}}>☰</span>
          <div style={{flex:1}}/>
          <span style={{fontSize:12,color:"#888"}}>当前商户：</span>
          <div style={{display:"flex",alignItems:"center",gap:4,background:"#f7f7f7",padding:"4px 10px",borderRadius:4,fontSize:12,color:"#333",border:"1px solid #eee"}}>
            广州聚客网络科技有限公司 <span style={{color:"#bbb",fontSize:10}}>▼</span>
          </div>
          <span style={{fontSize:12,color:"#888"}}>当前服务公司：</span>
          <div style={{display:"flex",alignItems:"center",gap:4,background:"#f7f7f7",padding:"4px 10px",borderRadius:4,fontSize:12,color:"#333",border:"1px solid #eee"}}>
            丽水正昀数字科技有限公司 <span style={{color:"#bbb",fontSize:10}}>▼</span>
          </div>
          <button style={s.btn}>切换公司</button>
          <span style={{fontSize:16,color:"#888",cursor:"pointer"}}>✉</span>
          <span style={{fontSize:12,color:"#666"}}>广州聚客网络科技有限公司</span>
          <span style={{color:"#bbb",fontSize:10}}>▼</span>
        </div>
        {/* Content */}
        <div style={{flex:1,overflowY:"auto"}}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// Pages
// ══════════════════════════════════════════════════════════════════

function HomePage({ setPage }) {
  return (
    <div style={{padding:20}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:14,color:"#666",marginBottom:4}}>欢迎登录正晔云</div>
        <div style={{fontSize:20,fontWeight:700,color:"#222",marginBottom:6}}>广州聚客网络科技有限公司</div>
        <div style={{fontSize:12,color:"#aaa"}}>登录时间：2026-05-09 15:01:00</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:16}}>
        {[
          {label:"账户充值",sub:"账户充值",icon:"💳",bg:"#fff5ec",page:"recharge"},
          {label:"任务结算",sub:"任务结算",icon:"💬",bg:"#eff6ff",page:"task-settle"},
          {label:"申请开票",sub:"申请开票",icon:"🖨️",bg:"#edfdf8",page:"invoice"},
          {label:"5.00%",sub:"服务费率",icon:"🧮",bg:"#f3efff",page:null},
        ].map((c,i)=>(
          <div key={i} className="card-hover" onClick={()=>c.page&&setPage(c.page)}
            style={{...s.card,padding:"20px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:c.page?"pointer":"default",transition:"box-shadow 0.2s"}}>
            <div>
              <div style={{fontSize:i===3?22:16,fontWeight:i===3?800:600,color:i===3?"#7c4dff":"#222",marginBottom:4}}>{c.label}</div>
              <div style={{fontSize:12,color:"#aaa"}}>{c.sub}</div>
            </div>
            <div style={{width:52,height:52,background:c.bg,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{c.icon}</div>
          </div>
        ))}
      </div>
      <div style={{...s.card,padding:"22px 24px"}}>
        <div style={{fontSize:14,fontWeight:600,color:"#333",marginBottom:16}}>金额数据</div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6}}>当前账户金额（元）</div>
          <div style={{fontSize:34,fontWeight:800,color:ACCENT}}>30525.22</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",paddingTop:16,borderTop:"1px solid #f5f5f5"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#666",marginBottom:5}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:"#52c41a",display:"inline-block"}}/>
              可用余额（元）<span style={{color:"#ccc",cursor:"pointer"}}>❓</span>
            </div>
            <div style={{fontSize:18,fontWeight:600,color:"#333"}}>30525.22</div>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#666",marginBottom:5}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:"#fa8c16",display:"inline-block"}}/>
              不可用余额（元）<span style={{color:"#ccc",cursor:"pointer"}}>❓</span>
            </div>
            <div style={{fontSize:18,fontWeight:600,color:"#333"}}>0</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function TaskPublishPage({ setPage }) {
  const rows = [
    {name:"外包运维服务",code:"138",type:"现代服务-其他现代服务",status:"已发布",count:"不限",created:"2026-01-08 11:50:29"},
    {name:"芽米推广任务",code:"127",type:"市场推广服务-市场推广服务",status:"已发布",count:"不限",created:"2025-12-13 22:14:33"},
    {name:"线下通讯网络推广",code:"124",type:"市场推广服务-市场推广服务",status:"已发布",count:"不限",created:"2025-12-11 17:16:53"},
  ];
  return (
    <div>
      <PageHd title="任务发布" />
      <SearchBox>
        <FInput label="任务编号：" placeholder="请输入编号" width={140} />
        <FInput label="任务名称：" placeholder="请输入名称" width={140} />
        <FSelect label="任务状态：" opts={["请选择状态","已发布","草稿","已关闭"]} />
        <FDate label="发布时间：" />
      </SearchBox>
      <div style={{...s.card,margin:"14px 20px 20px"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f5f5f5"}}>
          <Btn onClick={()=>setPage("task-new")}>+ 新建任务</Btn>
        </div>
        <table style={{width:"100%"}}>
          <TH cols={["任务名称","任务编码","任务类型","任务状态","任务人数","创建时间","审核备注","操作"]} />
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i}><td style={s.td}>{r.name}</td><td style={s.td}>{r.code}</td><td style={s.td}>{r.type}</td>
              <td style={s.td}><Tag v={r.status}/></td><td style={s.td}>{r.count}</td><td style={s.td}>{r.created}</td><td style={s.td}/>
              <td style={s.td}><A label="生成邀请码"/><A label="签约信息"/><A label="详情"/><br/><A label="关闭"/></td></tr>
            ))}
          </tbody>
        </table>
        <Pager total={3} />
      </div>
    </div>
  );
}

function TaskNewPage({ setPage }) {
  const [toast, setToast] = useState(null);
  const showToast = (msg, type="success") => {
    setToast({msg, type});
    setTimeout(()=>setToast(null), 2500);
  };
  const handleSaveDraft = () => showToast("草稿保存成功！", "success");
  const handleSubmit = () => showToast("任务已提交审核，请等待平台审核。", "success");
  const row = {display:"flex",alignItems:"flex-start",gap:12,marginBottom:22};
  const lbl = {width:100,textAlign:"right",color:"#555",fontSize:13,paddingTop:7,flexShrink:0};
  const req = <span style={{color:ACCENT}}>* </span>;
  return (
    <div>
      <PageHd title="任务发布" crumb="新建任务" onBack={()=>setPage("task-publish")} />
      <div style={{...s.card,margin:"14px 20px 80px",padding:"28px 40px"}}>
        <div style={row}>
          <span style={lbl}>{req}任务名称：</span>
          <input placeholder="请输入" style={{...s.input,width:340}} />
        </div>
        <div style={row}>
          <span style={lbl}>{req}任务类型：</span>
          <div style={{display:"flex",gap:8}}>
            <select style={{...s.select,width:158,color:"#aaa"}}><option>请选择一级分类</option><option>市场推广服务</option><option>现代服务</option></select>
            <span style={{color:"#aaa",alignSelf:"center"}}>-</span>
            <select style={{...s.select,width:158,color:"#aaa"}}><option>请选择二级分类</option><option>市场推广服务</option><option>其他现代服务</option></select>
          </div>
        </div>
        <div style={row}>
          <span style={lbl}>{req}结算方式：</span>
          <div style={{display:"flex",gap:18,paddingTop:7}}>
            {["日结","周结","月结","次结","项目结","小时结"].map(m=>(
              <label key={m} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:13}}>
                <input type="radio" name="settle" style={{accentColor:ACCENT}} />{m}
              </label>
            ))}
          </div>
        </div>
        <div style={row}>
          <span style={lbl}>{req}任务佣金：</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input placeholder="最低金额" style={{...s.input,width:130}} />
            <span style={{color:"#aaa"}}>-</span>
            <input placeholder="最高金额" style={{...s.input,width:130}} />
            <span style={{fontSize:12,color:"#888"}}>单位：元，若填写相同金额，则展示固定金额</span>
          </div>
        </div>
        <div style={row}>
          <span style={lbl}>{req}任务地点类型：</span>
          <div style={{display:"flex",gap:18,paddingTop:7}}>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:13}}><input type="radio" name="loc" style={{accentColor:ACCENT}}/>线上</label>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:13,color:ACCENT}}><input type="radio" name="loc" defaultChecked style={{accentColor:ACCENT}}/>线下</label>
          </div>

            <span style={{fontSize:13,color:"#888"}}>元（可用余额：30525.22 元）</span>
          </div>
        </div>
        <div style={row}>
          <span style={lbl}>{req}退款原因：</span>
          <select style={{...s.select,width:220}}>
            <option value="">请选择退款原因</option>
            <option>业务调整，余额不再使用</option>
            <option>充值金额过多</option>
            <option>合作终止</option>
            <option>其他原因</option>
          </select>
        </div>
        <div style={row}>
          <span style={lbl}>备注说明：</span>
          <textarea placeholder="请输入补充说明（选填）" style={{width:340,height:80,padding:"8px 10px",border:"1px solid #ddd",borderRadius:4,fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}} />
        </div>
        <div style={row}>
          <span style={lbl}>收款账户：</span>
          <div style={{fontSize:13,color:"#333",paddingTop:7,lineHeight:1.8}}>
            <div>户名：广州聚客网络科技有限公司</div>
            <div style={{color:"#999",fontSize:12}}>退款将原路退回至您的银行对公账户，预计 3-5 个工作日到账</div>
          </div>
        </div>
      </div>
      <div style={{position:"fixed",bottom:0,left:182,right:0,background:"#fff",borderTop:"1px solid #eee",padding:"12px 40px",display:"flex",gap:12}}>
        <Btn onClick={()=>{ showToast("退款申请已提交，请等待平台审核"); setTimeout(()=>setPage("refund"),2600); }}>提交退款申请</Btn>
        <GBtn onClick={()=>setPage("refund")}>取消</GBtn>
      </div>
      {toast&&(
        <div style={{position:"fixed",top:64,left:"50%",transform:"translateX(-50%)",zIndex:2000,
          background:"#52c41a",color:"#fff",padding:"10px 24px",borderRadius:6,fontSize:13,
          boxShadow:"0 4px 16px rgba(0,0,0,0.15)",display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>
          ✓ {toast}
        </div>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const render = () => {
    if(page.startsWith("talent-detail-")) return <TalentDetailPage setPage={setPage} talentId={page}/>;
    switch(page) {
      case "home":              return <HomePage setPage={setPage}/>;
      case "task-publish":      return <TaskPublishPage setPage={setPage}/>;
      case "task-new":          return <TaskNewPage setPage={setPage}/>;
      case "sign-talent":       return <SignTalentPage setPage={setPage}/>;
      case "task-review":       return <TaskReviewPage/>;
      case "delivery-review":   return <DeliveryReviewPage/>;
      case "task-settle":       return <TaskSettlePage setPage={setPage}/>;
      case "task-settle-batch": return <TaskSettleBatchPage setPage={setPage}/>;
      case "task-delivery":     return <TaskDeliveryPage/>;
      case "invoice":           return <InvoicePage/>;
      case "recharge":          return <RechargePage/>;
      case "refund":            return <RefundPage setPage={setPage}/>;
      case "refund-apply":      return <RefundApplyPage setPage={setPage}/>;
      case "declare":           return <DeclarePage/>;
      case "msg-center":        return <MsgCenterPage/>;
      case "account-info":      return <AccountInfoPage/>;
      case "api-config":        return <ApiConfigPage/>;
      default:                  return <div style={{padding:40,color:"#aaa"}}>页面开发中…</div>;
    }
  };
  return <Layout page={page} setPage={setPage}>{render()}</Layout>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
